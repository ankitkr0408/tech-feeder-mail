name: Daily Tech Radar

on:
  schedule:
    # Runs at 11:00 AM IST (5:30 AM UTC) daily
    - cron: '30 5 * * *'
  
  # Allow manual trigger (only for repo collaborators)
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    
    # Security: Only run for repo owner
    if: github.actor == github.repository_owner || github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run daily digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL: ${{ secrets.EMAIL }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          TZ: Asia/Kolkata
        run: npm start -- --test

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: |
            *.log
          retention-days: 7
